<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>blueprinted.io</title>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_v }}" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; box-sizing:border-box; }
    .splash-wrap { width:100%; max-width:420px; text-align:center; }
    .splash-brand { display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:36px; }
    .splash-brand-name { font-size:22px; font-weight:700; letter-spacing:-.02em; }
    .splash-card { background:var(--panel); border:1px solid color-mix(in oklab, var(--border) 70%, transparent); border-radius:20px; padding:36px 32px; box-shadow:0 24px 60px rgba(17,24,39,.10), 0 1px 0 rgba(17,24,39,.04); }
    .splash-card h2 { margin:0 0 6px; font-size:20px; }
    .splash-card .sub { color:var(--muted); font-size:14px; margin:0 0 28px; }
    .splash-actions { display:flex; flex-direction:column; gap:12px; }
    .splash-btn { display:flex; flex-direction:column; align-items:center; gap:4px; padding:16px; border-radius:14px; border:1px solid color-mix(in oklab, var(--border) 70%, transparent); background:var(--bg); cursor:pointer; text-decoration:none; color:var(--ink); transition:box-shadow .15s ease, border-color .15s ease; }
    .splash-btn:hover { box-shadow:0 4px 16px rgba(17,24,39,.08); border-color:var(--accent); }
    .splash-btn-title { font-weight:800; font-size:15px; }
    .splash-btn-sub { font-size:12px; color:var(--muted); }
    .theme-pill { position:fixed; top:16px; right:16px; }
  </style>
</head>
<body>
  <button class="btn secondary theme-pill" type="button" id="theme-toggle">Theme</button>

  <div class="splash-wrap">
    <div class="splash-brand">
      <img class="logo-light" src="/static/logo-light.svg" alt="blueprinted.io" style="height:52px; width:auto" />
      <img class="logo-dark"  src="/static/logo-dark.svg"  alt="blueprinted.io" style="height:52px; width:auto; display:none" />
      <div class="splash-brand-name">blueprinted.io</div>
    </div>

    <div class="splash-card">
      <h2>Welcome</h2>
      <p class="sub">How would you like to continue?</p>

      <div class="splash-actions">
        <a class="splash-btn" href="/login/demo">
          <span class="splash-btn-title">Try the demo</span>
          <span class="splash-btn-sub">One-click login with sample data</span>
        </a>
        <a class="splash-btn" href="/login/password">
          <span class="splash-btn-title">Sign in</span>
          <span class="splash-btn-sub">Use your account credentials</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    (function(){
      function setTheme(mode){
        const root = document.documentElement;
        const ll = document.querySelector('.logo-light');
        const ld = document.querySelector('.logo-dark');
        if(mode === 'dark'){
          root.setAttribute('data-theme','dark');
          try{ localStorage.setItem('theme','dark'); }catch(e){}
          if(ll) ll.style.display = 'none';
          if(ld) ld.style.display = 'block';
        } else {
          root.removeAttribute('data-theme');
          try{ localStorage.setItem('theme','light'); }catch(e){}
          if(ll) ll.style.display = 'block';
          if(ld) ld.style.display = 'none';
        }
        const btn = document.getElementById('theme-toggle');
        if(btn) btn.textContent = 'Theme: ' + (root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');
      }
      let saved = 'light';
      try{ saved = localStorage.getItem('theme') || 'light'; }catch(e){}
      setTheme(saved === 'dark' ? 'dark' : 'light');
      const btn = document.getElementById('theme-toggle');
      if(btn) btn.addEventListener('click', function(){
        const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        setTheme(cur === 'light' ? 'dark' : 'light');
      });
    })();
  </script>
</body>
</html>
