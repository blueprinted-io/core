<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · blueprinted.io</title>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_v }}" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; box-sizing:border-box; }
    .login-wrap { width:100%; max-width:400px; }
    .login-brand { display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:28px; text-align:center; }

    .login-card { background:var(--panel); border:1px solid color-mix(in oklab, var(--border) 70%, transparent); border-radius:20px; padding:32px; box-shadow:0 24px 60px rgba(17,24,39,.10), 0 1px 0 rgba(17,24,39,.04); }
    .login-card h2   { margin:0 0 4px; font-size:20px; }
    .login-card .sub { color:var(--muted); font-size:14px; margin:0 0 24px; }
    .login-error { background:color-mix(in oklab, #ef4444 10%, var(--panel)); border:1px solid color-mix(in oklab, #ef4444 30%, var(--border)); color:#b91c1c; border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:18px; }
    html[data-theme="dark"] .login-error { color:#fca5a5; }
    .login-card label               { display:block; margin-top:16px; }
    .login-card label:first-of-type { margin-top:0; }
    .login-card input               { width:100%; box-sizing:border-box; }
    .login-submit { width:100%; margin-top:24px; }
    .back-link { display:block; text-align:center; margin-top:16px; font-size:13px; color:var(--muted); text-decoration:none; }
    .back-link:hover { color:var(--ink); }
    .theme-pill { position:fixed; top:16px; right:16px; }
  </style>
</head>
<body>
  <button class="btn secondary theme-pill" type="button" id="theme-toggle">Theme</button>

  <div class="login-wrap">
    <div class="login-brand">
      <img class="logo-light" src="/static/logo-light.svg" alt="blueprinted.io" style="height:52px; width:auto" />
      <img class="logo-dark"  src="/static/logo-dark.svg"  alt="blueprinted.io" style="height:52px; width:auto; display:none" />
    </div>

    <div class="login-card">
      <h2>Sign in</h2>
      <p class="sub">Enter your credentials to continue.</p>

      <form method="post" action="/login">
        <input type="hidden" name="target_db" value="production" />
        <label>Username</label>
        <input name="username" autocomplete="username" required />

        <label>Password</label>
        <input name="password" type="password" autocomplete="current-password" required />

        <button class="btn login-submit" type="submit">Sign in</button>
      </form>
    </div>

    <a href="/login" class="back-link">← Back</a>
  </div>

  <script>
    (function(){
      function setTheme(mode){
        const root = document.documentElement;
        const ll = document.querySelector('.logo-light');
        const ld = document.querySelector('.logo-dark');
        if(mode === 'dark'){
          root.setAttribute('data-theme','dark');
          try{ localStorage.setItem('theme','dark'); }catch(e){}
          if(ll) ll.style.display = 'none';
          if(ld) ld.style.display = 'block';
        } else {
          root.removeAttribute('data-theme');
          try{ localStorage.setItem('theme','light'); }catch(e){}
          if(ll) ll.style.display = 'block';
          if(ld) ld.style.display = 'none';
        }
        const btn = document.getElementById('theme-toggle');
        if(btn) btn.textContent = 'Theme: ' + (root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');
      }
      let saved = 'light';
      try{ saved = localStorage.getItem('theme') || 'light'; }catch(e){}
      setTheme(saved === 'dark' ? 'dark' : 'light');
      const btn = document.getElementById('theme-toggle');
      if(btn) btn.addEventListener('click', function(){
        const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        setTheme(cur === 'light' ? 'dark' : 'light');
      });
    })();
  </script>
</body>
</html>
